<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mini-Nessus Web{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="brand">
                <h1>Mini-Nessus Web</h1>
                <p>{% block brand_subtitle %}Lightweight vulnerability scanning dashboard{% endblock %}</p>
            </div>

            <div class="topbar-actions">
                {% block topbar_actions %}{% endblock %}
            </div>
        </div>
    </header>

    <main class="container page">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
